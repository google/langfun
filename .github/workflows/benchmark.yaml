name: Benchmark

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  benchmark:
    name: "benchmark on ${{ matrix.python-version }}"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        python-version: ["3.12"]
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v1
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install pytest
        pip install -r requirements.txt
    - name: Run benchmark
      run: |
        pytest benchmarks/ -v
      timeout-minutes: 30